<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" width="100%" preserveAspectRatio="xMidYMid meet" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, 'JetBrains Mono', monospace">
  <defs>
    <style>
      .bg       { fill: #0a0908; }
      .surface  { fill: #131210; }
      .border   { stroke: #25231f; fill: none; }
      .text     { fill: #efece3; }
      .muted    { fill: #74706a; }
      .faint    { fill: #4d4a45; }
      .accent   { fill: #d4ff3d; }
      .doing    { fill: #f5a524; }
      .review   { fill: #5eead4; }
      .display  { font-family: 'Fraunces', Georgia, 'Times New Roman', serif; }
    </style>
  </defs>

  <!-- Outer card -->
  <rect x="4" y="4" width="872" height="332" class="surface" stroke="#25231f" stroke-width="1"/>

  <!-- Top bar -->
  <g>
    <text x="20" y="32" class="muted" font-size="10" letter-spacing="1.6">§ LIVE DEMO</text>
    <text x="120" y="32" class="faint" font-size="10" letter-spacing="1.4">WS://LOCALHOST:3001 · STREAMING</text>
    <g>
      <rect x="800" y="24" width="6" height="6" class="accent">
        <animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/>
      </rect>
      <text x="814" y="32" class="accent" font-size="10" letter-spacing="1.6">LIVE</text>
    </g>
    <line x1="12" y1="48" x2="868" y2="48" stroke="#25231f"/>
  </g>

  <!-- Columns: each 204 wide, gap 8, starting x=20 -->
  <!-- Column 0: TODO  (x=20)   active 0.00..0.25 -->
  <!-- Column 1: DOING (x=232)  active 0.25..0.50 -->
  <!-- Column 2: REVIEW(x=444)  active 0.50..0.75 -->
  <!-- Column 3: DONE  (x=656)  active 0.75..1.00 -->

  <!-- ============== COLUMN 0 — TODO ============== -->
  <g>
    <rect x="20" y="60" width="204" height="264" fill="#0a0908" stroke="#25231f" stroke-width="1">
      <animate attributeName="stroke" dur="10.4s" repeatCount="indefinite"
               values="#d4ff3d;#d4ff3d;#25231f;#25231f;#25231f"
               keyTimes="0;0.23;0.25;0.99;1"/>
    </rect>
    <line x1="20" y1="88" x2="224" y2="88" stroke="#25231f"/>
    <text x="32" y="79" class="faint" font-size="9" letter-spacing="1.4">01</text>
    <text x="52" y="79" font-size="10" letter-spacing="1.6" font-weight="600" fill="#d4ff3d">
      <animate attributeName="fill" dur="10.4s" repeatCount="indefinite"
               values="#d4ff3d;#d4ff3d;#74706a;#74706a;#74706a"
               keyTimes="0;0.23;0.25;0.99;1"/>
      TODO
    </text>
    <!-- footer -->
    <line x1="20" y1="304" x2="224" y2="304" stroke="#25231f"/>
    <text x="32" y="318" class="faint" font-size="9" letter-spacing="1.4">QUEUED</text>

    <!-- card -->
    <g opacity="0">
      <animate attributeName="opacity" dur="10.4s" repeatCount="indefinite"
               values="0;1;1;0;0"
               keyTimes="0;0.02;0.23;0.25;1"/>
      <rect x="32" y="100" width="180" height="192" class="surface" stroke="#25231f"/>
      <rect x="32" y="100" width="2" height="192" class="doing"/>
      <text x="42" y="118" class="faint" font-size="9" letter-spacing="1.4">CLF-87</text>
      <text x="200" y="118" class="doing" font-size="9" letter-spacing="1.4" text-anchor="end">P2</text>
      <text x="42" y="148" class="text display" font-size="15">Add user</text>
      <text x="42" y="166" class="text display" font-size="15">authentication</text>
      <line x1="42" y1="186" x2="202" y2="186" stroke="#25231f"/>
      <circle cx="48" cy="208" r="2" class="faint"/>
      <text x="58" y="212" class="muted" font-size="9" letter-spacing="1.4">QUEUED</text>
    </g>
  </g>

  <!-- ============== COLUMN 1 — DOING ============== -->
  <g>
    <rect x="232" y="60" width="204" height="264" fill="#0a0908" stroke="#25231f" stroke-width="1">
      <animate attributeName="stroke" dur="10.4s" repeatCount="indefinite"
               values="#25231f;#25231f;#d4ff3d;#d4ff3d;#25231f;#25231f"
               keyTimes="0;0.25;0.27;0.48;0.50;1"/>
    </rect>
    <line x1="232" y1="88" x2="436" y2="88" stroke="#25231f"/>
    <text x="244" y="79" class="faint" font-size="9" letter-spacing="1.4">02</text>
    <text x="264" y="79" font-size="10" letter-spacing="1.6" font-weight="600" fill="#74706a">
      <animate attributeName="fill" dur="10.4s" repeatCount="indefinite"
               values="#74706a;#74706a;#d4ff3d;#d4ff3d;#74706a;#74706a"
               keyTimes="0;0.25;0.27;0.48;0.50;1"/>
      DOING
    </text>
    <line x1="232" y1="304" x2="436" y2="304" stroke="#25231f"/>
    <text x="244" y="318" class="faint" font-size="9" letter-spacing="1.4">AGENT WRITES</text>

    <g opacity="0">
      <animate attributeName="opacity" dur="10.4s" repeatCount="indefinite"
               values="0;0;1;1;0;0"
               keyTimes="0;0.25;0.27;0.48;0.50;1"/>
      <rect x="244" y="100" width="180" height="192" class="surface" stroke="#25231f"/>
      <rect x="244" y="100" width="2" height="192" class="doing"/>
      <text x="254" y="118" class="faint" font-size="9" letter-spacing="1.4">CLF-87</text>
      <text x="412" y="118" class="doing" font-size="9" letter-spacing="1.4" text-anchor="end">P2</text>
      <text x="254" y="148" class="text display" font-size="15">Add user</text>
      <text x="254" y="166" class="text display" font-size="15">authentication</text>
      <line x1="254" y1="186" x2="414" y2="186" stroke="#25231f"/>
      <!-- animated dots -->
      <rect x="254" y="206" width="3" height="3" class="doing">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0s" repeatCount="indefinite"/>
      </rect>
      <rect x="260" y="206" width="3" height="3" class="doing">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
      </rect>
      <rect x="266" y="206" width="3" height="3" class="doing">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
      </rect>
      <text x="276" y="212" class="doing" font-size="9" letter-spacing="1.4">AGENT WRITES</text>
    </g>
  </g>

  <!-- ============== COLUMN 2 — REVIEW ============== -->
  <g>
    <rect x="444" y="60" width="204" height="264" fill="#0a0908" stroke="#25231f" stroke-width="1">
      <animate attributeName="stroke" dur="10.4s" repeatCount="indefinite"
               values="#25231f;#25231f;#d4ff3d;#d4ff3d;#25231f;#25231f"
               keyTimes="0;0.50;0.52;0.73;0.75;1"/>
    </rect>
    <line x1="444" y1="88" x2="648" y2="88" stroke="#25231f"/>
    <text x="456" y="79" class="faint" font-size="9" letter-spacing="1.4">03</text>
    <text x="476" y="79" font-size="10" letter-spacing="1.6" font-weight="600" fill="#74706a">
      <animate attributeName="fill" dur="10.4s" repeatCount="indefinite"
               values="#74706a;#74706a;#d4ff3d;#d4ff3d;#74706a;#74706a"
               keyTimes="0;0.50;0.52;0.73;0.75;1"/>
      REVIEW
    </text>
    <line x1="444" y1="304" x2="648" y2="304" stroke="#25231f"/>
    <text x="456" y="318" class="faint" font-size="9" letter-spacing="1.4">HUMAN READS</text>

    <g opacity="0">
      <animate attributeName="opacity" dur="10.4s" repeatCount="indefinite"
               values="0;0;1;1;0;0"
               keyTimes="0;0.50;0.52;0.73;0.75;1"/>
      <rect x="456" y="100" width="180" height="192" class="surface" stroke="#25231f"/>
      <rect x="456" y="100" width="2" height="192" class="doing"/>
      <text x="466" y="118" class="faint" font-size="9" letter-spacing="1.4">CLF-87</text>
      <text x="624" y="118" class="doing" font-size="9" letter-spacing="1.4" text-anchor="end">P2</text>
      <text x="466" y="148" class="text display" font-size="15">Add user</text>
      <text x="466" y="166" class="text display" font-size="15">authentication</text>
      <line x1="466" y1="186" x2="626" y2="186" stroke="#25231f"/>
      <rect x="466" y="206" width="3" height="3" class="review"/>
      <text x="476" y="212" class="review" font-size="9" letter-spacing="1.4">PR #87 · DIFF READY</text>
    </g>
  </g>

  <!-- ============== COLUMN 3 — DONE ============== -->
  <g>
    <rect x="656" y="60" width="204" height="264" fill="#0a0908" stroke="#25231f" stroke-width="1">
      <animate attributeName="stroke" dur="10.4s" repeatCount="indefinite"
               values="#25231f;#25231f;#d4ff3d;#d4ff3d;#25231f"
               keyTimes="0;0.75;0.77;0.99;1"/>
    </rect>
    <line x1="656" y1="88" x2="860" y2="88" stroke="#25231f"/>
    <text x="668" y="79" class="faint" font-size="9" letter-spacing="1.4">04</text>
    <text x="688" y="79" font-size="10" letter-spacing="1.6" font-weight="600" fill="#74706a">
      <animate attributeName="fill" dur="10.4s" repeatCount="indefinite"
               values="#74706a;#74706a;#d4ff3d;#d4ff3d;#74706a"
               keyTimes="0;0.75;0.77;0.99;1"/>
      DONE
    </text>
    <line x1="656" y1="304" x2="860" y2="304" stroke="#25231f"/>
    <text x="668" y="318" class="faint" font-size="9" letter-spacing="1.4">MERGED</text>

    <g opacity="0">
      <animate attributeName="opacity" dur="10.4s" repeatCount="indefinite"
               values="0;0;1;1;0"
               keyTimes="0;0.75;0.77;0.99;1"/>
      <rect x="668" y="100" width="180" height="192" class="surface" stroke="#25231f"/>
      <rect x="668" y="100" width="2" height="192" class="doing"/>
      <text x="678" y="118" class="faint" font-size="9" letter-spacing="1.4">CLF-87</text>
      <text x="836" y="118" class="doing" font-size="9" letter-spacing="1.4" text-anchor="end">P2</text>
      <text x="678" y="148" class="text display" font-size="15">Add user</text>
      <text x="678" y="166" class="text display" font-size="15">authentication</text>
      <line x1="678" y1="186" x2="838" y2="186" stroke="#25231f"/>
      <rect x="678" y="206" width="3" height="3" class="accent"/>
      <text x="688" y="212" class="accent" font-size="9" letter-spacing="1.4">MERGED ✓</text>
    </g>
  </g>
</svg>
